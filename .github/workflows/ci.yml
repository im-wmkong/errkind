name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go: ["1.24.x", "1.25.x"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      # 仓库内有多个独立 module (主 module + ext/zap, ext/zerolog, ext/logrus 等),
      # `go test ./...` 不会跨 module, 必须遍历每个 go.mod 单独跑。
      # 直接复用 scripts/test.sh, 避免本地与 CI 逻辑重复漂移; --group 启用日志折叠。
      - name: vet / build / test (all modules)
        shell: bash
        run: bash scripts/test.sh --group -race

      # 仅核心 module 上传覆盖率, ext 子 module 由 coverage 任务单独跑。
      - name: go test (core, with coverage)
        if: matrix.go == '1.24.x' && matrix.os == 'ubuntu-latest'
        run: go test ./... -race -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage
        if: matrix.go == '1.24.x' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  coverage-gate:
    name: Coverage Gate (core >= 90%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Run core tests with coverage
        run: go test ./... -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Enforce coverage threshold
        shell: bash
        run: |
          set -euo pipefail
          threshold=90.0
          # examples/ 是演示代码, cmd/ 是 CLI 入口, internal/ 是工具链支持代码,
          # 三者都不属于"用户使用的核心库 API", 不参与覆盖率统计。
          grep -v -E '/(examples|cmd|internal)/' coverage.out > coverage.core.out
          pct=$(go tool cover -func=coverage.core.out | awk '/^total:/ {print $3}' | sed 's/%//')
          echo "core total coverage: ${pct}% (threshold: ${threshold}%)"
          awk -v p="$pct" -v t="$threshold" 'BEGIN { if (p+0 < t+0) { exit 1 } }'

  staticcheck:
    name: Staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: Run staticcheck (all modules)
        shell: bash
        run: |
          set -euo pipefail
          for mod in $(find . -name go.mod -not -path "./.git/*" -print); do
            dir=$(dirname "$mod")
            echo "::group::staticcheck $dir"
            (cd "$dir" && staticcheck ./...)
            echo "::endgroup::"
          done

  govulncheck:
    name: Govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # 用 stable 而非固定大版本: govulncheck 会基于当前 toolchain 评估 stdlib 漏洞,
          # 跟随最新 GA 可自动吸收 stdlib 安全修复 (例如 GO-2026-5037 修于 1.25.11)。
          go-version: stable
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck (all modules)
        shell: bash
        run: |
          set -euo pipefail
          for mod in $(find . -name go.mod -not -path "./.git/*" -print); do
            dir=$(dirname "$mod")
            echo "::group::govulncheck $dir"
            (cd "$dir" && govulncheck ./...)
            echo "::endgroup::"
          done
